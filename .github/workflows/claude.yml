name: Claude Code

# @claude メンションを受けて Claude Code Action を起動するメイン workflow。
# scan-pr-conflicts.yml が conflict 検知時に PR コメントで @claude を呼び出すので、
# その PR ごとに 1 session ずつ走り、conflict を自動修正 → push する。
#
# 必要な secrets:
#   - ANTHROPIC_API_KEY: Anthropic の API キー (Settings > Secrets > Actions)
#   - GITHUB_TOKEN は自動付与
#
# Cloud-hosted の Claude Code (claude.ai/code 経由) を使う場合は CLAUDE_CODE_OAUTH_TOKEN を
# 代わりに設定する。詳細は https://github.com/anthropics/claude-code-action を参照。

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, assigned]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write
  actions: read

jobs:
  claude:
    name: Claude Code session
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Claude Code
        # claude-code-action は trigger_phrase ("@claude") をイベント本文から検出して
        # 該当しない場合は no-op で終了する。そのため workflow 側で if 判定をする必要はない。
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          trigger_phrase: "@claude"
          # conflict 解決時のデフォルトモデル (難度の高い merge にも対応できるよう Opus を既定)
          model: claude-opus-4-7
          allowed_tools: |
            Bash(git:*),
            Bash(gh:*),
            Bash(npm:*),
            Bash(pnpm:*),
            Bash(yarn:*),
            Bash(bun:*),
            Bash(node:*),
            Bash(npx:*),
            Bash(make:*),
            Edit,
            Read,
            Write,
            Glob,
            Grep
