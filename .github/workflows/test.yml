name: test

on:
  push:
    branches: [master]
  pull_request:

jobs:
  bun-test:
    name: bun test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      # package.json の "test" 経由で呼ぶ (bunfig.toml root と bunfig.scripts.toml root の
      # 2 config を両方回す。理由は bunfig.scripts.toml のコメント参照)。
      - run: bun run test

  typecheck:
    name: tsc --noEmit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bunx tsc --noEmit -p tsconfig.json

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Run shellcheck
        run: |
          set -euo pipefail
          mapfile -d '' -t sh_files < <(
            find . \
              -path ./node_modules -prune -o \
              -path ./.git -prune -o \
              -type f -name '*.sh' -print0
          )
          mapfile -d '' -t shebang_files < <(
            find . \
              -path ./node_modules -prune -o \
              -path ./.git -prune -o \
              -type f ! -name '*.sh' -print0 |
            while IFS= read -r -d '' f; do
              if head -n1 "$f" 2>/dev/null | grep -qE "^#!.*\\b(bash|sh)\\b"; then
                printf '%s\0' "$f"
              fi
            done
          )
          files=("${sh_files[@]}" "${shebang_files[@]}")
          if [ ${#files[@]} -eq 0 ]; then
            echo "No shell scripts found"
            exit 0
          fi
          printf 'Checking: %s\n' "${files[@]}"
          shellcheck "${files[@]}"
