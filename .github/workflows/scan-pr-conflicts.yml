name: Scan PR Conflicts (nightly)

# 毎日深夜 (UTC 15:00 = JST 00:00) に既存 PR を走査し、
# merge conflict が発生している PR ごとに Claude Code Action セッションを 1 つ割り当てて
# 自動で conflict 解決対応を実施する。
#
# NOTE: GitHub の再帰防止ポリシーにより GITHUB_TOKEN で投稿したコメントは
# 別 workflow (claude.yml の issue_comment) を起動しない。そのため本 workflow は
# コメント経由で claude.yml を起動するのではなく、matrix job 内で
# claude-code-action を prompt モードで直接実行する。

on:
  schedule:
    # JST 00:00 = UTC 15:00
    - cron: "0 15 * * *"
  workflow_dispatch:
    inputs:
      pr_numbers:
        description: "対象 PR 番号 (カンマ区切り)。空なら conflict 検知された全 PR が対象"
        required: false
        default: ""

permissions:
  contents: read
  pull-requests: write
  issues: write
  actions: read

jobs:
  detect:
    name: Detect conflicting PRs
    runs-on: ubuntu-latest
    outputs:
      prs: ${{ steps.find.outputs.prs }}
      has_targets: ${{ steps.find.outputs.has_targets }}
    steps:
      - name: List PRs with conflicts
        id: find
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MANUAL_PRS: ${{ github.event.inputs.pr_numbers }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          # GitHub は PR を取得した直後だと mergeable が UNKNOWN になる場合がある。
          # その場合は少し待ってから再取得することで判定を確定させる。
          fetch_prs() {
            gh pr list \
              --repo "$REPO" \
              --state open \
              --limit 200 \
              --json number,title,headRefName,baseRefName,mergeable,isDraft,author
          }

          prs_json="$(fetch_prs)"

          # mergeable が UNKNOWN の PR がある場合、確定するまで最大 5 回リトライ
          for i in 1 2 3 4 5; do
            unknown_count=$(echo "$prs_json" | jq '[.[] | select(.mergeable == "UNKNOWN")] | length')
            if [ "$unknown_count" -eq 0 ]; then
              break
            fi
            echo "mergeable=UNKNOWN の PR が $unknown_count 件あります。15 秒待って再取得します (試行 $i/5)"
            sleep 15
            prs_json="$(fetch_prs)"
          done

          if [ -n "${MANUAL_PRS:-}" ]; then
            echo "Manual PR filter: $MANUAL_PRS"
            # set -e 下で空集合になっても落ちないよう、抽出は || true でガード
            raw_nums="$(echo "$MANUAL_PRS" | tr ',' '\n' | sed 's/[^0-9]//g' | grep -v '^$' || true)"
            if [ -z "$raw_nums" ]; then
              echo "有効な PR 番号が指定されていません。対象なしとして終了します。"
              conflicting='[]'
            else
              filter=$(printf '%s\n' "$raw_nums" | jq -R . | jq -s 'map(tonumber)')
              conflicting=$(echo "$prs_json" | jq --argjson nums "$filter" '[.[] | select(.number as $n | $nums | index($n))]')
            fi
          else
            conflicting=$(echo "$prs_json" | jq '[.[] | select(.mergeable == "CONFLICTING" and .isDraft == false)]')
          fi

          count=$(echo "$conflicting" | jq 'length')
          echo "Conflicting PR count: $count"
          echo "$conflicting" | jq -r '.[] | "  #\(.number) (head=\(.headRefName) base=\(.baseRefName))"'

          # matrix include 用に整形 (PR title はここでは使わない。command injection 防止のため)
          matrix=$(echo "$conflicting" | jq -c '[.[] | {number: .number, head: .headRefName, base: .baseRefName}]')
          echo "prs=$matrix" >> "$GITHUB_OUTPUT"
          if [ "$count" -gt 0 ]; then
            echo "has_targets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_targets=false" >> "$GITHUB_OUTPUT"
          fi

  resolve:
    name: "Resolve conflicts (PR #${{ matrix.pr.number }})"
    needs: detect
    if: needs.detect.outputs.has_targets == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      # PR ごとに 1 session を割り当てる。1 つが失敗しても他は継続。
      fail-fast: false
      max-parallel: 3
      matrix:
        pr: ${{ fromJSON(needs.detect.outputs.prs) }}
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Validate PR metadata
        env:
          PR_NUMBER: ${{ matrix.pr.number }}
          PR_HEAD: ${{ matrix.pr.head }}
          PR_BASE: ${{ matrix.pr.base }}
        run: |
          set -euo pipefail
          # PR_HEAD / PR_BASE は GitHub の制約上 ref 名のみだが、念のため英数 / -_./ のみ許可
          if ! printf '%s' "$PR_HEAD" | grep -Eq '^[A-Za-z0-9._/-]+$'; then
            echo "Invalid head ref name: $PR_HEAD" >&2
            exit 1
          fi
          if ! printf '%s' "$PR_BASE" | grep -Eq '^[A-Za-z0-9._/-]+$'; then
            echo "Invalid base ref name: $PR_BASE" >&2
            exit 1
          fi
          if ! printf '%s' "$PR_NUMBER" | grep -Eq '^[0-9]+$'; then
            echo "Invalid PR number: $PR_NUMBER" >&2
            exit 1
          fi

      - name: Dedup check (skip if handled within 24h)
        id: dedup
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ matrix.pr.number }}
        run: |
          set -euo pipefail
          # bot が投稿したマーカーコメントのみを対象にし、第三者コメントによる
          # 抑止迂回を防ぐ。GITHUB_TOKEN 投稿は author.login が github-actions[bot]。
          recent=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json comments \
            --jq '[.comments[]
                   | select(.author.login == "github-actions" or .author.login == "github-actions[bot]")
                   | select(.body | contains("scan-pr-conflicts marker:v1"))
                   | .createdAt] | sort | last // ""')
          skip=false
          if [ -n "$recent" ]; then
            recent_epoch=$(date -u -d "$recent" +%s 2>/dev/null || date -j -f "%Y-%m-%dT%H:%M:%SZ" "$recent" +%s 2>/dev/null || echo 0)
            now_epoch=$(date -u +%s)
            diff=$(( now_epoch - recent_epoch ))
            if [ "$diff" -lt 86400 ]; then
              echo "Already handled within last 24h (at $recent). Skipping."
              skip=true
            fi
          fi
          echo "skip=$skip" >> "$GITHUB_OUTPUT"

      - name: Post audit marker comment
        if: steps.dedup.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ matrix.pr.number }}
          PR_BASE: ${{ matrix.pr.base }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          body_file="$(mktemp)"
          {
            printf 'このPRは `%s` との間で merge conflict を検知しました。\n' "$PR_BASE"
            printf 'scan-pr-conflicts workflow が自動 conflict 解決セッションを開始します。\n\n'
            printf -- '- 進捗: %s\n\n' "$RUN_URL"
            printf -- '<!-- scan-pr-conflicts marker:v1 ts=%s -->\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } > "$body_file"
          gh pr comment "$PR_NUMBER" --repo "$REPO" --body-file "$body_file"
          rm -f "$body_file"

      - name: Checkout PR head branch
        if: steps.dedup.outputs.skip != 'true'
        uses: actions/checkout@v6.0.3
        with:
          ref: ${{ matrix.pr.head }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve conflicts with Claude Code
        if: steps.dedup.outputs.skip != 'true'
        uses: anthropics/claude-code-action@v1.0.157
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # model/allowed_tools は v1 の input に存在しないため claude_args 経由で渡す。
          # model は version 非依存のエイリアス (opus) を使い外部仕様依存を避ける。
          claude_args: >-
            --model opus
            --allowedTools "Bash(git:*),Bash(gh:*),Bash(npm:*),Bash(pnpm:*),Bash(yarn:*),Bash(bun:*),Bash(node:*),Bash(npx:*),Bash(make:*),Edit,Read,Write,Glob,Grep"
          prompt: |
            このリポジトリの PR #${{ matrix.pr.number }} で `${{ matrix.pr.base }}` ブランチとの
            merge conflict が発生しています。リポジトリの `.claude/skills/pr-conflict-resolver`
            skill の手順に厳密に従って conflict を解決してください。

            前提:
            - 既に PR head ブランチ `${{ matrix.pr.head }}` を checkout 済みです。
            - base ブランチは `${{ matrix.pr.base }}` です。

            要件:
            1. `origin/${{ matrix.pr.base }}` を merge し conflict を解決する
               (両側の意図を尊重し機能を欠落させない / lock ファイルは再生成する)
            2. 既存のテスト・Lint・型チェックが通ることを可能な範囲で確認する
            3. 解決後の commit を `${{ matrix.pr.head }}` に push する
            4. このPRに「conflict 解決完了 / 残課題」を要約コメントで報告する

            解決が困難な場合は無理に merge せず、skill の「無理しない撤退判断」に従い
            conflict 箇所の概要と推奨方針を PR にコメントして終了してください。

  summary:
    name: Summary
    needs: [detect, resolve]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Report
        env:
          HAS_TARGETS: ${{ needs.detect.outputs.has_targets }}
          PRS: ${{ needs.detect.outputs.prs }}
        run: |
          if [ "$HAS_TARGETS" != "true" ]; then
            echo "Conflict ありの PR はありません。"
            exit 0
          fi
          echo "対象 PR 番号:"
          echo "$PRS" | jq -r '.[] | "  - #\(.number) (head=\(.head) base=\(.base))"'
