name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

# 同一 PR への連続 push では古い実行をキャンセル
concurrency:
  group: claude-code-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # kanade0404/skills の自作 code-review skill で 1 ジョブにレビューを統合。
  # （ローカルでは rulesync で .claude/skills/ へ同期している skill。
  #  CI ではソースリポジトリを SHA 固定で checkout して同じ skill を再現する）
  #
  # 以前は custom skill / built-in /review の 2 ジョブ構成だったが、
  #   1. 2 ジョブが同じ action キャッシュ (_actions/anthropics/...) を並行使用して
  #      "Internal error: directory mismatch" を誘発していた
  #   2. レビューが二重に走りサマリコメントも 2 つできていた
  # ため 1 ジョブへ統合した。
  claude-review:
    name: Claude Code Review
    # 異常終了で PR の CI を赤くしないための設計:
    # - 主因: claude-code-action は OIDC→GitHub App トークン交換時に
    #   「ワークフローファイルが default ブランチと同一内容であること」を検証する。
    #   そのため claude-code-review.yml 自身を変更する PR では bot/人間を問わず
    #   "App token exchange failed: 401 - Workflow validation failed" で必ず失敗する。
    #   この制約は action 側の仕様で回避できないため、Run ステップに
    #   continue-on-error: true を付け、レビューが失敗しても CI を赤にしない
    #   (レビューは助言であり PR をブロックすべきでないため妥当な割り切り)。
    # - fork PR は secrets (CLAUDE_CODE_OAUTH_TOKEN) が渡らず必ず失敗する。
    # - renovate / dependabot などの bot PR もレビュー不要。
    #   ノイズ低減のため fork / bot PR は下記 if で除外する
    #   (※これは異常終了の根本対策ではなく副次的なクリーンアップ)。
    # permissions は claude-code-action の標準セット
    # (contents/pull-requests/issues/id-token) のみで十分。
    if: >-
      github.event.pull_request.head.repo.fork == false &&
      github.actor != 'renovate[bot]' &&
      github.actor != 'dependabot[bot]' &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    # Claude やステップがハングした場合の暴走を防ぐ
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Checkout custom skill source (kanade0404/skills)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: kanade0404/skills
          # 再現性のため commit SHA で固定。更新時は
          #   gh api repos/kanade0404/skills/commits/master --jq .sha
          # の結果に差し替える
          ref: dd4d49e70c0cb27a3e6f7feb99c4a7b85f501eb6
          path: .tmp-skills-src
          fetch-depth: 1

      - name: Stage custom code-review skill into .claude/skills
        run: |
          set -euo pipefail
          mkdir -p .claude/skills
          rm -rf .claude/skills/code-review
          cp -R .tmp-skills-src/skills/code-review .claude/skills/code-review
          rm -rf .tmp-skills-src

      - name: Run custom code-review skill
        id: claude-review
        # レビューはあくまで助言。bot 除外で根本原因は潰しているが、
        # 万一 action 側の一時障害等で異常終了しても PR の CI を失敗扱いにしない安全網。
        continue-on-error: true
        uses: anthropics/claude-code-action@51ea8ea73a139f2a74ff649e3092c25a904aed7e # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # サマリ(総評)を 1 つの固定コメントとして push 毎に更新し続ける。
          # pull_request イベント専用の機能で、これにより毎回新規コメントを作らない。
          use_sticky_comment: true
          # github.repository / PR 番号のみ補間（slug と整数で injection 安全）。
          # base ブランチ等の差分情報は action が注入する PR コンテキストと
          # gh pr diff に委ねる。
          prompt: |
            /code-review

            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            上記 PR を自作 code-review skill でレビューしてください。
            PR の base ブランチとの差分を対象に Critical / Important / Minor の
            三分類で findings をまとめてください。

            ## レビュー結果の出力方法（厳守）
            出力は次の 2 種類に必ず分けてください。

            1. サマリ（総評）:
               PR 全体の総評・findings の概要・残課題を、あなたの「最終メッセージ」として
               1 つにまとめてください。このメッセージは sticky comment として
               同じコメントが更新され続けます。gh pr comment で新しいコメントを
               作成しないでください（毎回コメントが増えるのを防ぐため）。

            2. 個別の指摘:
               具体的な指摘は必ず mcp__github_inline_comment__create_inline_comment
               ツールを使い、該当ファイル・該当行へインラインコメントとして残してください。
               個別行の指摘をサマリ側へ重複して列挙しないでください。

            指摘が無い場合も、その旨をサマリ（最終メッセージ）に記載してください。
          claude_args: |
            --allowedTools "Task,Read,Bash(git diff:*),Bash(git log:*),Bash(gh pr view:*),Bash(gh pr diff:*),mcp__github_inline_comment__create_inline_comment"
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
