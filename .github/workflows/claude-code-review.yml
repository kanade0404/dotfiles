name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

# 同一 PR への連続 push では古い実行をキャンセル
concurrency:
  group: claude-code-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # kanade0404/skills の自作 code-review skill で 1 ジョブにレビューを統合。
  # （ローカルでは rulesync で .claude/skills/ へ同期している skill。
  #  CI ではソースリポジトリを SHA 固定で checkout して同じ skill を再現する）
  #
  # 以前は custom skill / built-in /review の 2 ジョブ構成だったが、
  #   1. 2 ジョブが同じ action キャッシュ (_actions/anthropics/...) を並行使用して
  #      "Internal error: directory mismatch" を誘発していた
  #   2. レビューが二重に走りサマリコメントも 2 つできていた
  # ため 1 ジョブへ統合した。
  claude-review:
    name: Claude Code Review
    # 異常終了 (exit 1) の根本対策:
    # - 真因: github_token を渡さないと claude-code-action は OIDC→GitHub App
    #   トークン交換を行い、その際「ワークフローが default ブランチと同一内容で
    #   あること」を検証する。そのため本ワークフロー自身を変更する PR では
    #   "App token exchange failed: 401 - Workflow validation failed" で必ず失敗し、
    #   レビューが全く投稿されないまま exit 1 になっていた。
    #   → 下記 step で github_token を明示的に渡し、App トークン交換 (OIDC 検証) 自体を
    #     スキップする。これが根本対策で、自己変更 PR でもレビューが正常に走る。
    # - 保険として Run step に continue-on-error: true も付ける。レビューは助言であり
    #   一時障害等で落ちても PR の CI を赤にすべきでないため。
    # - fork PR は secrets (CLAUDE_CODE_OAUTH_TOKEN) が渡らず動かない。renovate /
    #   dependabot 等の bot PR はレビュー不要。両者はノイズ低減目的で下記 if で除外。
    # permissions は claude-code-action の標準セット
    # (contents/pull-requests/issues/id-token) で十分。
    if: >-
      github.event.pull_request.head.repo.fork == false &&
      github.actor != 'renovate[bot]' &&
      github.actor != 'dependabot[bot]' &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    # Claude やステップがハングした場合の暴走を防ぐ
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Checkout custom skill source (kanade0404/skills)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: kanade0404/skills
          # 再現性のため commit SHA で固定。更新時は
          #   gh api repos/kanade0404/skills/commits/master --jq .sha
          # の結果に差し替える
          ref: dd4d49e70c0cb27a3e6f7feb99c4a7b85f501eb6
          path: .tmp-skills-src
          fetch-depth: 1

      - name: Stage custom code-review skill into .claude/skills
        run: |
          set -euo pipefail
          mkdir -p .claude/skills
          rm -rf .claude/skills/code-review
          cp -R .tmp-skills-src/skills/code-review .claude/skills/code-review
          rm -rf .tmp-skills-src

      - name: Run custom code-review skill
        id: claude-review
        # レビューは助言。根本対策 (github_token 明示) で異常終了は解消済みだが、
        # 万一 action 側の一時障害等で落ちても PR の CI を失敗扱いにしない保険。
        continue-on-error: true
        uses: anthropics/claude-code-action@51ea8ea73a139f2a74ff649e3092c25a904aed7e # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # github_token を明示的に渡すと action は OIDC→GitHub App トークン交換を
          # 行わず、このトークンを直接使う。これにより自己変更 PR で 401 となる
          # identical-content 検証 (OIDC) を回避できる。GITHUB_TOKEN は自動付与され
          # 追加 secret は不要。Anthropic 認証は上の oauth_token が担うため併用可。
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # サマリは action の use_sticky_comment / track_progress を使わない。
          # 理由: use_sticky_comment は claude[bot] 認証専用で、上記の通り
          # github_token (= github-actions[bot]) を渡す構成では既存コメントの
          # 照合が外れ、run 毎に新規コメントが増えてしまう (公式 FAQ 記載)。
          # 代わりに prompt 内で隠しマーカー付きコメントを自前で PATCH/POST して
          # 「単一コメントを更新し続ける」を実現する (下記 prompt 参照)。
          # github.repository / PR 番号のみ補間（slug と整数で injection 安全）。
          prompt: |
            /code-review

            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            上記 PR を自作 code-review skill でレビューしてください。
            PR の base ブランチとの差分を対象に Critical / Important / Minor の
            三分類で findings をまとめてください。

            ## レビュー結果の出力方法（厳守）
            出力は次の 2 種類に必ず分けてください。

            ### 1. サマリ（総評）— 単一コメントを更新し続ける
            PR 全体の総評・findings の概要・残課題を 1 つの「サマリコメント」に
            まとめます。run のたびに新規コメントを作らず、既存のサマリコメントを
            更新してください。手順:
            1. サマリ本文の先頭に必ず次の隠しマーカー行を含める:
               <!-- claude-code-review:summary -->
            2. 既存コメントを取得:
               gh api "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" --paginate
            3. body にそのマーカーを含むコメントを探す。
            4-a. 見つかれば、その comment id に対して更新 (PATCH):
                 gh api --method PATCH "repos/${{ github.repository }}/issues/comments/<ID>" -F body=@<file>
            4-b. 見つからなければ新規作成 (POST):
                 gh api --method POST "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" -F body=@<file>
            ※ body は改行を含むため一時ファイル経由 (-F body=@<file>) で渡すこと。

            ### 2. 個別の指摘 — 該当行へインライン
            具体的な指摘は必ず mcp__github_inline_comment__create_inline_comment
            ツールを使い、該当ファイル・該当行へインラインコメントとして残してください。
            個別行の指摘をサマリ側へ重複して列挙しないでください。

            指摘が無い場合も、その旨をサマリコメント (マーカー付き) に記載して更新してください。
          claude_args: |
            --allowedTools "Task,Read,Bash(git diff:*),Bash(git log:*),Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh api:*),mcp__github_inline_comment__create_inline_comment"
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md

      # continue-on-error でレビュー失敗を CI に波及させない代わりに、
      # 失敗が誰にも気づかれないサイレント化を防ぐため警告として可視化する
      # (Important 指摘への対応)。CI ステータスは緑のまま、ログ/Annotations に残る。
      - name: Warn if review step failed
        if: steps.claude-review.outcome == 'failure'
        run: |
          echo "::warning title=Claude Code Review failed::レビュー step が失敗しました (CI は継続)。OAuth トークン期限切れや action 障害の可能性があります。ログを確認してください。"
