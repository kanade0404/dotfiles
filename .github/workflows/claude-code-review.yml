name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

# 同一 PR への連続 push では古い実行をキャンセル
concurrency:
  group: claude-code-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # kanade0404/skills の自作 code-review skill で 1 ジョブにレビューを統合。
  # （ローカルでは rulesync で .claude/skills/ へ同期している skill。
  #  CI ではソースリポジトリを SHA 固定で checkout して同じ skill を再現する）
  #
  # built-in /review は run 成功でもレビューを出さず空振りすることがあったため、
  # findings を Critical / Important / Minor で安定して出す自作 skill を採用する。
  claude-review:
    name: Claude Code Review
    # 異常終了 (exit 1) の根本対策:
    # - 真因: github_token を渡さないと claude-code-action は OIDC→GitHub App
    #   トークン交換を行い、その際「ワークフローが default ブランチと同一内容で
    #   あること」を検証する。そのため本ワークフロー自身を変更する PR では
    #   "App token exchange failed: 401 - Workflow validation failed" で必ず失敗し、
    #   レビューが全く投稿されないまま exit 1 になっていた。
    #   → 下記 step で github_token を明示的に渡し、App トークン交換 (OIDC 検証) 自体を
    #     スキップする。これが根本対策で、自己変更 PR でもレビューが正常に走る。
    # - 保険として Run step に continue-on-error: true も付ける。レビューは助言であり
    #   一時障害等で落ちても PR の CI を赤にすべきでないため。
    # - fork PR は secrets (CLAUDE_CODE_OAUTH_TOKEN) が渡らず動かない。renovate /
    #   dependabot 等の bot PR はレビュー不要。両者はノイズ低減目的で下記 if で除外。
    #   bot 判定は「実行をトリガーした人」ではなく PR 作成者 (pull_request.user.login)
    #   で行う。トリガー実行者だとメンテナが bot の PR を再実行した際に判定が外れるため。
    if: >-
      github.event.pull_request.head.repo.fork == false &&
      github.event.pull_request.user.login != 'renovate[bot]' &&
      github.event.pull_request.user.login != 'dependabot[bot]' &&
      github.event.pull_request.user.login != 'github-actions[bot]'
    runs-on: ubuntu-latest
    # Claude やステップがハングした場合の暴走を防ぐ
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Checkout custom skill source (kanade0404/skills)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: kanade0404/skills
          # 再現性のため commit SHA で固定。更新時は
          #   gh api repos/kanade0404/skills/commits/master --jq .sha
          # の結果に差し替える
          ref: dd4d49e70c0cb27a3e6f7feb99c4a7b85f501eb6
          path: .tmp-skills-src
          fetch-depth: 1

      - name: Stage custom code-review skill into .claude/skills
        run: |
          set -euo pipefail
          mkdir -p .claude/skills
          rm -rf .claude/skills/code-review
          cp -R .tmp-skills-src/skills/code-review .claude/skills/code-review
          rm -rf .tmp-skills-src

      - name: Run custom code-review skill
        id: claude-review
        # レビューは助言。根本対策 (github_token 明示) で異常終了は解消済みだが、
        # 万一 action 側の一時障害等で落ちても PR の CI を失敗扱いにしない保険。
        continue-on-error: true
        uses: anthropics/claude-code-action@41ea7642c1436fa0ee57aae58347904b71a5af27 # v1.0.137
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # github_token を明示的に渡すと action は OIDC→GitHub App トークン交換を
          # 行わず、このトークンを直接使う。これにより自己変更 PR で 401 となる
          # identical-content 検証 (OIDC) を回避できる。GITHUB_TOKEN は自動付与され
          # 追加 secret は不要。Anthropic 認証は上の oauth_token が担うため併用可。
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # サマリ投稿は LLM に任せず、後続の決定的ステップ
          # (upsert-pr-comment.sh) が行う。ここでは Claude にサマリ本文を
          # 固定パスのファイルへ書き出させるだけにする。
          # 理由: action の use_sticky_comment は claude[bot] 認証専用で、
          # github_token (= github-actions[bot]) を渡す構成では効かず run 毎に
          # コメントが増える (公式 FAQ 記載)。代替の「マーカー検索→PATCH/POST」を
          # LLM に gh api で毎回実行させるのは不安定なため、投稿ロジックは
          # スクリプトへ切り出して安定化・最小権限化する。
          # github.repository / PR 番号のみ補間（slug と整数で injection 安全）。
          prompt: |
            /code-review

            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            上記 PR を自作 code-review skill でレビューしてください。
            PR の base ブランチとの差分を対象に Critical / Important / Minor の
            三分類で findings をまとめてください。

            ## レビュー結果の出力方法（厳守）
            出力は次の 2 種類に必ず分けてください。

            ### 1. サマリ（総評）— ファイルに書き出す
            PR 全体の総評・findings の概要・残課題を Markdown でまとめ、
            必ずファイル `${{ runner.temp }}/claude-review-summary.md` に Write で
            書き出してください（このファイルの内容が、後続ステップにより
            「単一のサマリコメント」として作成/更新されます）。
            自分で gh コマンドを使ってコメントを投稿しないでください
            （二重投稿を防ぐため。投稿は後続の決定的ステップが担います）。
            指摘が無い場合も、その旨を必ず同ファイルに書き出してください。

            ### 2. 個別の指摘 — 該当行へインライン
            具体的な指摘は必ず mcp__github_inline_comment__create_inline_comment
            ツールを使い、該当ファイル・該当行へインラインコメントとして残してください。
            個別行の指摘をサマリ側へ重複して列挙しないでください。
          claude_args: |
            --allowedTools "Task,Read,Write,Bash(git diff:*),Bash(git log:*),Bash(gh pr view:*),Bash(gh pr diff:*),mcp__github_inline_comment__create_inline_comment"
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md

      # サマリ(総評)を単一コメントとして upsert する決定的ステップ。
      # Claude が書き出した本文ファイルを使い、隠しマーカーで既存コメントを
      # 探して PATCH (無ければ POST)。これで「同じコメントを更新し続ける」を
      # LLM の手順実行に依存せず確実に実現する。
      # レビュー本体が失敗してファイルが無い/空のときはスクリプトが no-op で抜ける。
      - name: Upsert review summary comment
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          .github/scripts/upsert-pr-comment.sh "${RUNNER_TEMP}/claude-review-summary.md"

      # continue-on-error でレビュー失敗を CI に波及させない代わりに、
      # 失敗が誰にも気づかれないサイレント化を防ぐため警告として可視化する。
      # CI ステータスは緑のまま、ログ/Annotations に残る。
      - name: Warn if review step failed
        if: steps.claude-review.outcome == 'failure'
        run: |
          echo "::warning title=Claude Code Review failed::レビュー step が失敗しました (CI は継続)。OAuth トークン期限切れ・API レート制限・action 障害などの可能性があります。ログを確認してください。"
