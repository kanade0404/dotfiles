name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

# 同一 PR への連続 push では古い実行をキャンセル
concurrency:
  group: claude-code-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # custom: kanade0404/skills の自作 code-review skill でレビュー
  # （ローカルでは rulesync で .claude/skills/ へ同期している skill。
  #  CI ではソースリポジトリを SHA 固定で checkout して同じ skill を再現する）
  custom-review:
    name: Custom skill review (kanade0404/skills code-review)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout custom skill source (kanade0404/skills)
        uses: actions/checkout@v4
        with:
          repository: kanade0404/skills
          # 再現性のため commit SHA で固定。更新時は
          #   gh api repos/kanade0404/skills/commits/master --jq .sha
          # の結果に差し替える
          ref: dd4d49e70c0cb27a3e6f7feb99c4a7b85f501eb6
          path: .tmp-skills-src
          fetch-depth: 1

      - name: Stage custom code-review skill into .claude/skills
        run: |
          set -euo pipefail
          mkdir -p .claude/skills
          rm -rf .claude/skills/code-review
          cp -R .tmp-skills-src/skills/code-review .claude/skills/code-review
          rm -rf .tmp-skills-src

      - name: Run custom code-review skill
        id: custom-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # github.repository / PR 番号のみ補間（slug と整数で injection 安全）。
          # base ブランチ等の差分情報は action が注入する PR コンテキストと
          # `gh pr diff` に委ねる。
          prompt: |
            /code-review

            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            上記 PR を自作 code-review skill でレビューしてください。
            PR の base ブランチとの差分を対象に Critical / Important / Minor の
            三分類で findings をまとめ、その結果を PR コメントとして投稿してください。
          claude_args: |
            --allowedTools "Task,Read,Bash(git diff:*),Bash(git log:*),Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr comment:*),mcp__github_inline_comment__create_inline_comment"
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md

  # built-in: Claude Code 組み込みの /review スラッシュコマンドでレビュー
  builtin-review:
    name: Built-in /review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run built-in /review
        id: builtin-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: '/review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}'
          claude_args: |
            --allowedTools "Read,Bash(git diff:*),Bash(git log:*),Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr comment:*),mcp__github_inline_comment__create_inline_comment"
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
