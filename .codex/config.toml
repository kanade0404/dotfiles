model = "gpt-5.5"
model_reasoning_effort = "high"
approvals_reviewer = "guardian_subagent"

# Codex is allowed to edit files inside the current workspace, but writes
# outside the workspace still require approval.
sandbox_mode = "workspace-write"

# Command permissions are managed by Codex execpolicy rules.
# See .codex/rules/default.rules for the Claude settings.json permissions mirror.

[marketplaces.claude-plugins-official]
last_revision = "c40770ae5a1d6855fce096c5b747e709ec946b2b"
source_type = "git"
source = "https://github.com/anthropics/claude-plugins-official.git"

# Local OpenAI marketplace source paths are generated by Codex and intentionally
# omitted from this template to keep machine-specific cache paths out of git.

[plugins."documents@openai-primary-runtime"]
enabled = true

[plugins."spreadsheets@openai-primary-runtime"]
enabled = true

[plugins."presentations@openai-primary-runtime"]
enabled = true

[plugins."agent-sdk-dev@claude-plugins-official"]
enabled = true

[plugins."aws-serverless@claude-plugins-official"]
enabled = true

[plugins."claude-code-setup@claude-plugins-official"]
enabled = true

[plugins."claude-md-management@claude-plugins-official"]
enabled = true

[plugins."code-review@claude-plugins-official"]
enabled = true

[plugins."code-simplifier@claude-plugins-official"]
enabled = true

[plugins."coderabbit@claude-plugins-official"]
enabled = false

[plugins."commit-commands@claude-plugins-official"]
enabled = true

[plugins."context7@claude-plugins-official"]
enabled = true

# deploy-on-aws は awsknowledge MCP も起動し、現環境では handshake に失敗する。
# AWS MCP 作業用には aws-serverless を有効のまま残す。
[plugins."deploy-on-aws@claude-plugins-official"]
enabled = false

[plugins."feature-dev@claude-plugins-official"]
enabled = true

[plugins."frontend-design@claude-plugins-official"]
enabled = true

# GitHub は下の OpenAI curated connector を優先する。公式 GitHub MCP は
# CODEX_GITHUB_PERSONAL_ACCESS_TOKEN がないと起動時に警告が出る。
[plugins."github@claude-plugins-official"]
enabled = false

# 必要になったら login 後に有効化する: codex mcp login huggingface-skills
[plugins."huggingface-skills@claude-plugins-official"]
enabled = false

[plugins."playground@claude-plugins-official"]
enabled = true

[plugins."playwright@claude-plugins-official"]
enabled = true

[plugins."plugin-dev@claude-plugins-official"]
enabled = true

[plugins."pr-review-toolkit@claude-plugins-official"]
enabled = true

[plugins."ralph-loop@claude-plugins-official"]
enabled = true

[plugins."security-guidance@claude-plugins-official"]
enabled = true

[plugins."serena@claude-plugins-official"]
enabled = true

[plugins."serena@claude-plugins-official".mcp_servers.serena.tools.write_memory]
approval_mode = "approve"

[plugins."skill-creator@claude-plugins-official"]
enabled = true

[plugins."superpowers@claude-plugins-official"]
enabled = true

# 必要になったら login 後に有効化する: codex mcp login zapier
[plugins."zapier@claude-plugins-official"]
enabled = false

# 必要になったら login 後に有効化する: codex mcp login linear
[plugins."linear@claude-plugins-official"]
enabled = false

[plugins."google-calendar@openai-curated"]
enabled = true

[plugins."gmail@openai-curated"]
enabled = true

[plugins."figma@openai-curated"]
enabled = true

[plugins."github@openai-curated"]
enabled = true

[plugins."google-drive@openai-curated"]
enabled = true

[plugins."computer-use@openai-bundled"]
enabled = true

[plugins."browser@openai-bundled"]
enabled = true

[plugins."chrome@openai-bundled"]
enabled = true

[plugins."linear@openai-curated"]
enabled = true

[plugins."coderabbit@openai-curated"]
enabled = true

[plugins."codex-security@openai-curated"]
enabled = true

[plugins."notion@openai-curated"]
enabled = true

[tui]
status_line = ["model-with-reasoning", "current-dir", "model", "git-branch", "context-used", "five-hour-limit", "weekly-limit", "fast-mode"]

[desktop]
ambient-suggestions-enabled = true
usePointerCursors = true
preventSleepWhileRunning = true
keepRemoteControlAwakeWhilePluggedIn = true
git-show-sidebar-pr-icons = true
selected-avatar-id = "custom:kanade"
conversationDetailMode = "STEPS_COMMANDS"

[desktop.open-in-target-preferences]
global = "ghostty"

[features]
hooks = true
js_repl = false
